services:
  # Alloy - The Collector
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # To scrape container logs/metrics
    command: [
      "run",
      "--server.http.listen-addr=0.0.0.0:12345",
      "--storage.path=/var/lib/alloy/data",
      "/etc/alloy/config.alloy"
    ]
    ports:
      - "12345:12345" # Alloy UI
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - monit-net

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: root
    command: [ "-config.file=/etc/tempo.yaml", "-target=all" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4318:4317" # Exposed so Alloy can push directly if needed
    networks:
      - monit-net


  # Loki - Logs Storage
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monit-net


  # Prometheus - Metrics Storage
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver # Required for Alloy to push metrics
    networks:
      - monit-net


  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - loki
      - prometheus
    networks:
      - monit-net

networks:
  monit-net:
    driver: bridge

