apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Gautam AWS Deployment</title>
        <style>
            body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .container { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
            h1 { color: #1a73e8; }
            .status { color: #34a853; font-weight: bold; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🚀 Success!</h1>
            <p>Your custom HTML is now served via <b>Nginx Ingress</b> on AWS.</p>
            <p class="status">Status: Online & Connected</p>
        </div>
    </body>
    </html>

