services:
  mongo_db:
    image: mongo:6
    container_name: mongodb
    restart: always
    env_file:
      - ./.env/mongo.env 
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/var/lib/mongo
      - ./db_backup/mongobackup:/backup
    networks:
      - db_net
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1           # Change to your AWS region
        awslogs-group: /docker/mongodb      # CloudWatch log group
        awslogs-stream: mongodb        # Prefix for log streams
        awslogs-create-group: "true"

  mongoexpress:
    image: mongo-express:latest
    container_name: mongoexpress
    restart: unless-stopped
    env_file:
      - ./.env/mongoexpress.env
    ports:
      - "8081:8081"
    depends_on:
      - mongo_db
    networks:
      - db_net

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8084:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql_db
    depends_on:
      - mysql_db
      - postgres
    networks:
      - db_net

  mysql_db:
    image: mysql:latest
    container_name: mysqldb
    restart: always
    env_file:
      - ./.env/mysql.env
    ports:
      - "3306:3306"
    volumes:
      - ./sql_data:/var/lib/mysql
      - ./db_backup:/tmp/db_backup
    networks:
      - db_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    env_file:
      - ./.env/phpmyadmin.env
    ports:
      - "8082:80"
    networks:
      - db_net
    depends_on:
      - mysql_db
    

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - ./.env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./db_backup/postgresback:/tmp/
    networks:
      - db_net

  pgadmin:
    image: elestio/pgadmin
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - ./.env/pgadmin.env
    ports:
      - "8083:80"
    networks:
      - db_net
    depends_on:
      - postgres
      
networks:
  db_net:
    driver: bridge

