   version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: task-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - swissie-network
      
  task-bot:
    build: .
    container_name: rajat-task-bot
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - swissie-network


  adaptive-engine:
    image: adaptive-engine:latest
    container_name: adaptive-engine
    ports:
      - "4777:4777"
    restart: unless-stopped
    environment:
      - INTERNAL_KEY=SuperSecret123
    networks:
      - swissie-network

    

volumes:
  redis-data:
    driver: local

networks:
  swissie-network:
    external: true


# Redis
REDIS_HOST=redis          # points to the redis container
REDIS_PORT=6379
REDIS_PASSWORD=
REDIS_DB=0

# App Settings
NODE_ENV=development
API_PORT=3000
INTERNAL_KEY=SuperSecret123   # used for /flow/sync

# Required by the app (currently missing)
N8N_WEBHOOK_URL=http://example.com/webhook   # can be a placeholder if you just want it to start
ENCRYPTION_KEY=12345678901234567890123456789012  # must be 32 chars (used in your code)

# Optional / placeholders (won't affect starting)
AWS_REGION=us-east-1
AWS_ACCESS_KEY_ID=
AWS_SECRET_ACCESS_KEY=
S3_BUCKET_NAME=
S3_CONFIG_KEY=
WEBHOOK_SECRET=
SMTP_HOST=
SMTP_PORT=
SMTP_USER=
SMTP_PASSWORD=
TWILIO_ACCOUNT_SID=
TWILIO_AUTH_TOKEN=
TWILIO_PHONE_NUMBER=
LOG_LEVEL=info
MAX_JOB_ATTEMPTS=3
JOB_TIMEOUT_MS=300000


