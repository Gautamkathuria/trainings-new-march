apiVersion: apps/v1
kind: Deployment
metadata:
  name: myhtml-app
spec:
  replicas: 3  # This will put 1 pod on each of your 3 worker nodes
  selector:
    matchLabels:
      app: myhtml
  template:
    metadata:
      labels:
        app: myhtml
    spec:
      containers:
      - name: html-container
        image: gautamkathuria/myhtmltestapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myhtml-service
spec:
  type: NodePort
  selector:
    app: myhtml
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007 # Access via http://localhost:30007
