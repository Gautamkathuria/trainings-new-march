services:
  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./data/nginx:/etc/nginx/conf.d
    networks:
      - nginx-net
    depends_on:
      - app1
      - app2
      - app3

  app1:
    build: ./backend/app1
    container_name: app1
    networks:
      - nginx-net


  app2:
    build: ./backend/app2
    container_name: app2
    networks:
      - nginx-net


  app3:
    build: ./backend/app3
    container_name: app3
    networks:
      - nginx-net

networks:
   nginx-net:
     driver: bridge
        
