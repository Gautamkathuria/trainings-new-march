server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # -----------------------------
  # Host system logs (optional)
  # -----------------------------
  - job_name: auth-log
    static_configs:
      - targets: [localhost]
        labels:
          job: auth-log
          __path__: /var/log/auth.log

  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: kern-log
    static_configs:
      - targets: [localhost]
        labels:
          job: kern-log
          __path__: /var/log/kern.log

  # -----------------------------
  # Docker container logs
  # (certbot, openvpn, etc.)
  # -----------------------------
  - job_name: docker

    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - output:
          source: log

    relabel_configs:
      # only keep selected containers
      - source_labels: [__meta_docker_container_name]
        regex: "/(certbot|openvpn-server|grafana|loki|promtail)"
        action: keep

      # clean container name
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container_name

      - source_labels: [stream]
        target_label: stream

