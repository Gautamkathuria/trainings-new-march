load_module modules/ngx_otel_module.so; # Enable the OTel module

events {}

http {
    otel_exporter {
        endpoint otel-collector:4317; # Send spans to the Collector
    }

    otel_service_name my-nginx-backend;
    otel_trace on; # Enable tracing for all requests
    otel_trace_context propagate; # Pass trace headers to upstream apps

    server {
        listen 80;

        location / {
            # Attach the Trace ID to the response header so you can see it in your browser
            add_header X-Trace-Id $otel_trace_id;
            
            # Example response (or proxy_pass to another container)
            return 200 "Success! Trace ID: $otel_trace_id\n";
        }
    }
}
