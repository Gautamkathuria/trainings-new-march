load_module modules/ngx_otel_module.so;

events {}

http {
    # Custom log format that includes trace_id
    log_format trace_format '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'trace_id="$otel_trace_id"';

    otel_exporter {
        endpoint otel-collector:4317;
    }

    otel_service_name my-nginx-backend;
    otel_trace on;
    otel_trace_context propagate;

    server {
        listen 80;
        access_log /var/log/nginx/access.log trace_format;
        location / {
            add_header X-Trace-Id $otel_trace_id;
            return 200 "Success! Trace ID: $otel_trace_id\n";
        }
    }
}
