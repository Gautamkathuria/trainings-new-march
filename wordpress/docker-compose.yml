services:
  db:
    image: mysql:8.0
    container_name: wp-db
    restart: always
    env_file:
      - ./.env/mysql.env
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - wp-network

  wordpress:
    image: wordpress:php8.2-apache
    container_name: wp-app
    restart: always
    ports:
      - "8081:80"
    env_file:
      - ./.env/wordpress.env
    volumes:
      - ./wp_data:/var/www/html
    depends_on:
      - db
    networks:
      - wp-network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: wp-jenkins
    restart: always
    user: root
    ports:
      - "8082:8080"
    volumes:
      - ./jenkins_data:/var/jenkins_home
      - /home/gautam/Desktop/project/multi-docker/wp_data:/var/www/html
      - /home/gautam/Desktop/project/multi-docker/wp_dev_data:/var/www/dev_html   
    networks:
      - wp-network


networks:
  wp-network:

